name: Migrate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Run migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
