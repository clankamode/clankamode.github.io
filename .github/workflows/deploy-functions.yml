name: Deploy Functions

on:
  workflow_dispatch: # disabled until secrets are configured — see issue #220
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref dwhegbuedhkbppekzmjd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
